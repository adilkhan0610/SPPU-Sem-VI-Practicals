<!DOCTYPE html>
<html>

<head>
<title>Bank Application using EJB</title>
</head>

<body style="font-family: Arial; text-align:center; background:#f4f4f4;">

<h2>Bank Application using EJB</h2>

<form method="post"
action="transact"
style="
background:white;
padding:20px;
width:300px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;">

Enter Amount:
<br>

<input type="text"
name="amount"
style="width:90%;padding:5px;">

<br><br>

<h3>Select option</h3>

<input type="radio"
name="transaction"
value="deposit">
Deposit
<br>

<input type="radio"
name="transaction"
value="withdraw">
Withdraw

<br><br>

<input type="submit"
value="Submit"
style="
padding:8px 15px;
background:MediumSeaGreen;
color:white;
border:none;">

</form>

</body>
</html>
