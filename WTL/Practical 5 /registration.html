<html>

<body style="font-family: Arial; background:#f4f4f4; text-align:center;">

<h2 style="background-color:Tomato;color:white;padding:10px;">
Student Registration
</h2>

<form action="registration.jsp"
method="POST"
style="background:white;
padding:20px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;">

Name:<br>
<input type="text" name="name" style="width:90%;">

<br><br>

Gender:

<input type="radio" name="gender" value="male">Male

<input type="radio" name="gender" value="female">Female

<br><br>

Email:<br>
<input type="text" name="email" style="width:90%;">

<br><br>

College:<br>
<input type="text" name="college" style="width:90%;">

<br><br>

Branch:<br>
<input type="text" name="branch" style="width:90%;">

<br><br>

Mobile:<br>
<input type="text" name="mobile" style="width:90%;">

<br><br>

Username:<br>
<input type="text" name="username" style="width:90%;">

<br><br>

Password:<br>
<input type="password" name="password" style="width:90%;">

<br><br>

<button type="submit"
style="padding:8px 15px;background:blue;color:white;border:none;">
Submit
</button>

<button type="reset"
style="padding:8px 15px;">
Reset
</button>

</form>

</body>
</html>
