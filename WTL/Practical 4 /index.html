<!DOCTYPE html>
<html>
<head>
<title>Form Validation</title>

<link href="ass4.css" rel="stylesheet">

<script>

function validateForm() {

var f = document.forms["myForm"];

if (
f["fname"].value == "" ||
f["mname"].value == "" ||
f["lname"].value == "" ||
f["email"].value == "" ||
f["ph"].value == "" ||
f["add"].value == ""
) {
alert("Enter all details");
return false;
}

return true;

}

</script>

</head>

<body>

<div class="one">

<h1>Student Validation Form</h1>

<form name="myForm"
action="message.html"
method="post"
onsubmit="return validateForm()">

First Name:
<input type="text" name="fname">
<br><br>

Middle Name:
<input type="text" name="mname">
<br><br>

Last Name:
<input type="text" name="lname">
<br><br>

Email:
<input type="email" name="email">
<br><br>

Phone:
<input type="number" name="ph">
<br><br>

Country:

<select name="country">

<option></option>

<option>India</option>

<option>America</option>

<option>Australia</option>

<option>Sweden</option>

<option>Africa</option>

</select>

<br><br>

Address:
<br>

<textarea name="add" rows="4" cols="30"></textarea>

<br><br>

<input type="submit" value="Submit">

</form>

</div>

</body>
</html>
